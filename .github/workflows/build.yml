name: Build this f4444444444

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v4

            -   name: Set up JDK 21
                uses: actions/setup-java@v4
                with:
                    java-version: '21'
                    distribution: 'temurin'

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v6
                with:
                    gradle-version: '8.14'

            -   name: Build
                run: gradle build

            -   name: Rename JAR to CherryModKit.jar
                run: |
                    JAR_FILE=$(find build/libs -name "CherryModKit-*.jar" ! -name "*-instrumented.jar" ! -name "*-base.jar" | head -n 1)
                    if [ -z "$JAR_FILE" ]; then
                        echo "Main jar not found"
                        exit 1
                    fi
                    cp "$JAR_FILE" CherryModKit.jar

            -   name: Upload CherryModKit.jar
                uses: actions/upload-artifact@v4
                with:
                    name: CherryModKit.jar
                    path: CherryModKit.jar
                    retention-days: 7
